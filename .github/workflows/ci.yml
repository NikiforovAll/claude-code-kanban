name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci

      - name: Lint & format check
        run: npx @biomejs/biome check --error-on-warnings public/app.js public/style.css

      - name: Syntax check
        run: node -c server.js

      - name: Contract tests
        run: npm test

      - name: Startup smoke test
        run: |
          PORT=9876 node server.js &
          sleep 2
          RESPONSE=$(curl -sf http://localhost:9876/api/version)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"version"' || { echo "Smoke test failed"; exit 1; }
          kill %1 2>/dev/null || true
